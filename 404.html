<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Página no encontrada | Reflex</title>
  <link rel="icon" href="./src/img/LOGO.ico" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Inter", "Segoe UI", system-ui, sans-serif;
      background: #0b0f19;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 20px;
    }
    .error-404 h1 { font-size: clamp(4rem, 12vw, 8rem); font-weight: 800; color: var(--accent, #f5a800); line-height: 1; margin-bottom: 8px; }
    .error-404 h2 { font-size: 1.5rem; font-weight: 600; margin-bottom: 12px; }
    .error-404 p { color: rgba(255,255,255,0.7); margin-bottom: 28px; max-width: 400px; }
    .error-404 a {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 14px 28px; border-radius: 30px;
      background: #f5a800; color: #0b0f19;
      font-weight: 700; text-decoration: none;
      transition: transform 0.3s ease;
    }
    .error-404 a:hover { transform: translateY(-3px); }
  </style>
</head>
<body>
  <div class="error-404">
    <h1>404</h1>
    <h2>Página no encontrada</h2>
    <p>La página que buscás no existe o fue movida.</p>
    <a href="/">← Volver al inicio</a>
  </div>
</body>
</html>
